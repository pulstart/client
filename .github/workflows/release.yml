name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FFMPEG_VERSION: "8.0"
  FFMPEG_BUILD_TAG: "latest"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            build_kind: unix
            package_id: linux-x64
          - name: macOS x64
            os: macos-15-intel
            build_kind: unix
            package_id: macos-x64
          - name: macOS arm64
            os: macos-15
            build_kind: unix
            package_id: macos-arm64
          - name: Windows x64
            os: windows-2022
            build_kind: windows
            package_id: windows-x64

    steps:
      - name: Checkout client with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive
          token: ${{ secrets.PROTOCOL_CHECKOUT_TOKEN || github.token }}

      - name: Derive version from git tag
        id: version
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            version="${GITHUB_REF#refs/tags/v}"
          else
            version="0.0.0-dev"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
          prefix-key: v2

      - name: Stamp Cargo.toml version
        shell: bash
        run: |
          sed -i.bak 's/^version = ".*"/version = "${{ steps.version.outputs.version }}"/' Cargo.toml
          rm -f Cargo.toml.bak
          echo "Cargo.toml version is now:"
          grep '^version' Cargo.toml
          cargo generate-lockfile

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libavutil-dev \
            libavcodec-dev \
            libavformat-dev \
            libswscale-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libopus-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg opus pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix ffmpeg)/lib/pkgconfig:$(brew --prefix opus)/lib/pkgconfig:${PKG_CONFIG_PATH}" >> "$GITHUB_ENV"

      # --- Windows: pre-built FFmpeg + vcpkg for opus only ---

      - name: Cache pre-built FFmpeg (Windows)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ffmpeg-prebuilt
          key: ${{ runner.os }}-ffmpeg-${{ env.FFMPEG_VERSION }}-${{ env.FFMPEG_BUILD_TAG }}

      - name: Download pre-built FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ffmpegZip = "ffmpeg-n${{ env.FFMPEG_VERSION }}-${{ env.FFMPEG_BUILD_TAG }}-win64-lgpl-shared-${{ env.FFMPEG_VERSION }}.zip"
          $ffmpegUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/${{ env.FFMPEG_BUILD_TAG }}/$ffmpegZip"
          $downloadDir = "${{ github.workspace }}\ffmpeg-prebuilt"
          New-Item -ItemType Directory -Force -Path $downloadDir | Out-Null
          $zipPath = "$downloadDir\$ffmpegZip"
          if (-not (Test-Path $zipPath)) {
            Write-Host "Downloading $ffmpegUrl ..."
            Invoke-WebRequest -Uri $ffmpegUrl -OutFile $zipPath -UseBasicParsing
          }
          Expand-Archive -Path $zipPath -DestinationPath $downloadDir -Force
          $extractedDir = Get-ChildItem -Path $downloadDir -Directory | Where-Object { $_.Name -like "ffmpeg-*" } | Select-Object -First 1
          echo "FFMPEG_DIR=$($extractedDir.FullName)" >> $env:GITHUB_ENV
          Write-Host "FFmpeg extracted to $($extractedDir.FullName)"

      - name: Checkout vcpkg
        if: runner.os == 'Windows'
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          path: vcpkg
          fetch-depth: 1

      - name: Restore vcpkg cache
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
            ~\AppData\Local\vcpkg\archives
          key: ${{ runner.os }}-vcpkg-opus-v1
          restore-keys: |
            ${{ runner.os }}-vcpkg-opus-

      - name: Build Unix release
        if: matrix.build_kind == 'unix'
        run: cargo build --release --locked

      - name: Package Unix artifact
        if: matrix.build_kind == 'unix'
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER: ${{ secrets.MACOS_NOTARY_ISSUER }}
          MACOS_NOTARY_API_KEY_BASE64: ${{ secrets.MACOS_NOTARY_API_KEY_BASE64 }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_APP_PASSWORD: ${{ secrets.MACOS_NOTARY_APP_PASSWORD }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
        run: bash ./scripts/package-unix.sh --platform ${{ matrix.package_id }}

      - name: Build Windows release
        if: matrix.build_kind == 'windows'
        shell: pwsh
        run: .\scripts\build-windows-msvc.ps1 -Configuration release -VcpkgRoot "${{ github.workspace }}\vcpkg" -FfmpegDir "${{ env.FFMPEG_DIR }}" -BootstrapVcpkg

      - name: Package Windows artifact
        if: matrix.build_kind == 'windows'
        shell: pwsh
        run: .\scripts\package-windows-release.ps1 -Configuration release

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_id }}
          path: dist/*-${{ matrix.package_id }}.*
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Recreate existing release for this tag
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            try {
              const { data: release } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.info(`Deleting existing release ${release.id} for tag ${tag}`);
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
              });
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing release found for tag ${tag}`);
                return;
              }
              throw error;
            }

      - name: Publish assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
