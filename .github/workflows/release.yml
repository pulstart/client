name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            build_kind: unix
            package_id: linux-x64
          - name: macOS x64
            os: macos-15-intel
            build_kind: unix
            package_id: macos-x64
          - name: macOS arm64
            os: macos-15
            build_kind: unix
            package_id: macos-arm64
          - name: Windows x64
            os: windows-2022
            build_kind: windows
            package_id: windows-x64

    steps:
      - name: Checkout client with submodules
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive
          token: ${{ secrets.PROTOCOL_CHECKOUT_TOKEN || github.token }}

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libavutil-dev \
            libavcodec-dev \
            libavformat-dev \
            libswscale-dev \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libopus-dev \
            libudev-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxrandr-dev \
            pkg-config

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg opus pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix ffmpeg)/lib/pkgconfig:$(brew --prefix opus)/lib/pkgconfig:${PKG_CONFIG_PATH}" >> "$GITHUB_ENV"

      - name: Checkout vcpkg
        if: runner.os == 'Windows'
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          path: vcpkg
          fetch-depth: 1

      - name: Restore vcpkg cache
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: |
            vcpkg/downloads
            vcpkg_installed
            ~\AppData\Local\vcpkg\archives
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}

      - name: Build Unix release
        if: matrix.build_kind == 'unix'
        run: cargo build --release --locked

      - name: Package Unix artifact
        if: matrix.build_kind == 'unix'
        run: bash ./scripts/package-unix.sh --platform ${{ matrix.package_id }}

      - name: Build Windows release
        if: matrix.build_kind == 'windows'
        shell: pwsh
        run: .\scripts\build-windows-msvc.ps1 -Configuration release -VcpkgRoot "${{ github.workspace }}\vcpkg" -BootstrapVcpkg

      - name: Package Windows artifact
        if: matrix.build_kind == 'windows'
        shell: pwsh
        run: .\scripts\package-windows-release.ps1 -Configuration release

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_id }}
          path: dist/*-${{ matrix.package_id }}.*
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
